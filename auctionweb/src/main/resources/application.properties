spring.application.name=auctionweb

# ===== DATABASE CONNECTION (H2 Embedded) =====
# Du lieu duoc luu vao file ./data/auction_db trong thu muc project
# Ai tai ve cung chay duoc, khong can cai them gi
spring.datasource.url=jdbc:h2:file:./data/auction_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===== JPA / HIBERNATE =====
# update = tự tạo/chỉnh bảng theo @Entity (không xóa dữ liệu cũ)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== H2 WEB CONSOLE =====
# Truy cap http://localhost:8080/h2-console de xem du lieu trong DB
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== SERVER PORT =====
server.port=8080

# ===== DEV SETTINGS =====
# Tắt cảnh báo open-in-view
spring.jpa.open-in-view=false
# Tắt Spring Security tạm thời để test API (xóa dòng này khi làm tính năng login thật)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration