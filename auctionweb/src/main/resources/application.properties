spring.application.name=auctionweb

# ===== DATABASE CONNECTION =====
spring.datasource.url=jdbc:mysql://localhost:3306/auction_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
# update = tự tạo/chỉnh bảng theo @Entity (không xóa dữ liệu cũ)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== SERVER PORT =====
server.port=8080

# ===== DEV SETTINGS =====
# Tắt cảnh báo open-in-view
spring.jpa.open-in-view=false
# Tắt Spring Security tạm thời để test API (xóa dòng này khi làm tính năng login thật)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration