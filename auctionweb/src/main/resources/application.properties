spring.application.name=auctionweb

# ===== DATABASE CONNECTION (H2 Embedded) =====
spring.datasource.url=jdbc:h2:file:./data/auction_db;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ===== JPA / HIBERNATE =====
# Chuyen ve update de luu tru du lieu vinh vien (khong bi xoa khi khoi dong lai)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== H2 CONSOLE =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== SERVER PORT =====
server.port=8080

# ===== DEV SETTINGS =====
spring.jpa.open-in-view=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration